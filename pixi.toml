[workspace]
authors = ["Neppel Elian <elian.neppel@posteo.eu>"]
channels = ["conda-forge"]
name = "asyncio-gazebo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
example = "python3 -m asyncio_gazebo.example"
sim = "gz sim diff_drive.sdf"
move = "pixi run gz topic -t '/model/vehicle_blue/cmd_vel' -m gz.msgs.Twist -p 'linear: {x: 0.5}, angular: {z: 0.1}'"

[dependencies]
gz-jetty = ">=1.0.0,<2"
python = ">=3.13.12,<3.14"
gz-transport = ">=15.0.2,<16"
gz-transport-python = ">=15.0.2,<16"
colorama = ">=0.4.6,<0.5"
spatialmath-python = ">=1.1.15,<2"
networkx = ">=3.6.1,<4"

[pypi-dependencies]
asyncio-gazebo = {path=".", editable=true}
transforms-py = {path="transforms-py", editable=true}
asyncio-for-robotics = ">=1.3.1, <2"
posetree = ">=1.1.2, <2"
numpy-quaternion = ">=2024.0.13, <2025"
