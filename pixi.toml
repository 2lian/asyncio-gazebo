[workspace]
authors = ["Neppel Elian <elian.neppel@posteo.eu>"]
channels = ["conda-forge"]
name = "asyncio-gazebo"
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64", "linux-aarch64",]
version = "0.1.0"

[tasks]
test = "pytest ./tests"
example = "python3 -m asyncio_gazebo.example"
sim = "gz sim diff_drive.sdf"
move = "pixi run gz topic -t '/model/vehicle_blue/cmd_vel' -m gz.msgs.Twist -p 'linear: {x: 0.5}, angular: {z: 0.1}'"

[dependencies]
gz-jetty = ">=1.0.0,<2"
python = ">=3.10.0,<3.14"
gz-transport = ">=15.0.2,<16"
gz-transport-python = ">=15.0.2,<16"
pytest = ">=9.0.2,<10"
pytest-asyncio = ">=1.3.0,<2"

[pypi-dependencies]
asyncio-gazebo = {path=".", editable=true}

[environments]
py310 = {features = ["py310"]}
py311 = {features = ["py311"]}
py312 = {features = ["py312"]}
py313 = {features = ["py313"]}
# py314 = {features = ["py314"]} # gazebo not compatible

[feature.py310]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64", "linux-aarch64",]
dependencies = {python = "3.10.*"}

[feature.py311]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64", "linux-aarch64",]
dependencies = {python = "3.11.*"}

[feature.py312]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64", "linux-aarch64",]
dependencies = {python = "3.12.*"}

[feature.py313]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64", "linux-aarch64",]
dependencies = {python = "3.13.*"}

